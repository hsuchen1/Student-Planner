# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyAdCxtGXVLLifQw-BED2pnNIc9F6pAovko"
          VITE_FIREBASE_AUTH_DOMAIN: "gen-lang-client-0006954980.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "gen-lang-client-0006954980"
          VITE_FIREBASE_STORAGE_BUCKET: "gen-lang-client-0006954980.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "278218751471"
          VITE_FIREBASE_APP_ID: "1:278218751471:web:462886f685966378e25j"
          VITE_FIREBASE_MEASUREMENT_ID: "G-XXXXXXXXXX"
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: "(default)"
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
